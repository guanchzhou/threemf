name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "project.yml"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "project.yml"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    runs-on: macos-15
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Install XcodeGen
        run: arch -arm64 brew install xcodegen

      - name: Generate and build
        run: |
          xcodegen generate
          xcodebuild -project threemf.xcodeproj -scheme ThreeMFQuickLook -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=14.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
