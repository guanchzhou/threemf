name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # Job 1: Build and test (no secrets, no signing)
  build:
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -project threemf.xcodeproj -scheme ThreeMFQuickLook -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: xcodebuild -project threemf.xcodeproj -scheme ThreeMFTests -configuration Debug test CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "threemf.app" -path "*/Release/*" | head -1)
          ditto -c -k --keepParent "$APP_PATH" threemf-unsigned.zip

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: threemf-unsigned
          path: threemf-unsigned.zip
          retention-days: 1

  # Job 2: Sign, notarize, release (isolated, has secrets)
  sign-and-release:
    needs: build
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Sources/HostApp/HostApp.entitlements
            Sources/PreviewExtension/PreviewExtension.entitlements
            Sources/ThumbnailExtension/ThumbnailExtension.entitlements

      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: threemf-unsigned

      - name: Unpack unsigned app
        run: ditto -x -k threemf-unsigned.zip .

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign app
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: Andrei Maltsev (DDZR8BZJYU)" \
            --entitlements Sources/ThumbnailExtension/ThumbnailExtension.entitlements \
            threemf.app/Contents/PlugIns/ThreeMFThumbnailExtension.appex

          codesign --force --options runtime \
            --sign "Developer ID Application: Andrei Maltsev (DDZR8BZJYU)" \
            --entitlements Sources/PreviewExtension/PreviewExtension.entitlements \
            threemf.app/Contents/PlugIns/ThreeMFPreviewExtension.appex

          codesign --force --options runtime \
            --sign "Developer ID Application: Andrei Maltsev (DDZR8BZJYU)" \
            --entitlements Sources/HostApp/HostApp.entitlements \
            threemf.app

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent threemf.app /tmp/threemf.zip

          xcrun notarytool submit /tmp/threemf.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple threemf.app

      - name: Create release ZIP
        run: ditto -c -k --keepParent threemf.app threemf.zip

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: threemf-signed
          path: threemf.zip
          retention-days: 5

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" threemf.zip \
            --title "threemf $TAG_NAME" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          SHA256=$(shasum -a 256 threemf.zip | awk '{print $1}')
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/guanchzhou/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/threemf.rb << CASK
          cask "threemf" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/guanchzhou/threemf/releases/download/v#{version}/threemf.zip"
            name "threemf"
            desc "Quick Look plugin for previewing .3mf and .stl 3D printing files"
            homepage "https://github.com/guanchzhou/threemf"

            depends_on macos: ">= :tahoe"
            depends_on arch: :arm64

            app "threemf.app"

            zap trash: [
              "~/Library/Containers/com.andreymaltsev.3mf-quicklook.preview",
              "~/Library/Containers/com.andreymaltsev.3mf-quicklook.thumbnail",
            ]
          end
          CASK

          git config user.email "maltsev.andrey@gmail.com"
          git config user.name "Andrei Maltsev"
          git add -A
          git commit -m "Update threemf to v${VERSION}"
          git push

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

  # Job 3: SLSA provenance (isolated, non-forgeable)
  provenance:
    needs: sign-and-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: threemf-signed

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: threemf.zip
